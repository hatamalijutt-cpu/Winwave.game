<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
background:#121212;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#222;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
background:#10b981;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>

</head>
<body>

<h2>Admin Panel</h2>

<div class="card">
<input type="text" id="userUid" placeholder="User UID">

<input type="number" id="amount" placeholder="Amount">

<button onclick="addBalance()">
Add Balance
</button>
</div>

<div style="display:flex;gap:10px;margin:20px 0;">
    
    <button onclick="showDeposits()">
        Deposit Requests
    </button>

    <button onclick="showWithdraws()">
        Withdraw Requests
    </button>

</div>

<div id="depositSection">

<h3 style="margin-top: 30px;">
Deposit Requests
</h3>

<div id="requestBox"></div>

</div>

<div id="withdrawSection" style="display:none;">

<h3 style="margin-top:30px;">
Withdraw Requests
</h3>

<div id="withdrawBox"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

// Step 2: onValue, set aur ab remove import mein add kar diye gaye hain
import {
getDatabase,
ref,
get,
update,
onValue,
set,
remove
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjw124Pc1wGpG1iNYGuKR9DmXo_OHCab8",
  authDomain: "winwave-b3ed4.firebaseapp.com",
  projectId: "winwave-b3ed4",
  storageBucket: "winwave-b3ed4.firebasestorage.app",
  messagingSenderId: "501831087781",
  appId: "1:501831087781:web:ea52d559bcb1429b9a3f4c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.addBalance = async function(){

    const uid =
    document.getElementById("userUid").value;

    const amount =
    Number(document.getElementById("amount").value);

    const snap =
    await get(ref(db,"users/"+uid));

    if(!snap.exists()){
        alert("User Not Found");
        return;
    }

    const currentBalance =
    snap.val().balance || 0;

    await update(
        ref(db,"users/"+uid),
        {
            balance: currentBalance + amount
        }
    );

    alert("Balance Added Successfully");
}

// Step 3: Approve Deposit function
window.approveDeposit = async function(requestId){

    const requestSnap =
    await get(ref(db,"depositRequests/"+requestId));

    if(!requestSnap.exists()) return;

    const request = requestSnap.val();

    if(request.status === "approved"){
        alert("Already Approved");
        return;
    }

    const userSnap =
    await get(ref(db,"users/"+request.uid));

    if(!userSnap.exists()){
        alert("User Not Found");
        return;
    }

    const balance =
    userSnap.val().balance || 0;

    await update(
        ref(db,"users/"+request.uid),
        {
            balance: balance + request.amount
        }
    );

    // --- NEW CODE ADDED HERE ---
    const userData = userSnap.val();

    if (
        userData.referredBy &&
        !userData.firstDepositBonusGiven
    ) {

        const depositAmount = request.amount;

        const level1Commission = depositAmount * 0.10; // 10%
        const level2Commission = depositAmount * 0.05; // 5%
        const level3Commission = depositAmount * 0.02; // 2%

        // LEVEL 1
        const level1Id = userData.referredBy;

        const level1Snap =
        await get(ref(db,"users/"+level1Id));

        if(level1Snap.exists()){

            const level1Data =
            level1Snap.val();

            await update(
                ref(db,"users/"+level1Id),
                {
                    balance:
                    (level1Data.balance||0)
                    + level1Commission,

                    totalCommission:
                    (level1Data.totalCommission||0)
                    + level1Commission
                }
            );

            // LEVEL 2
            if(level1Data.referredBy){

                const level2Id =
                level1Data.referredBy;

                const level2Snap =
                await get(
                ref(db,"users/"+level2Id)
                );

                if(level2Snap.exists()){

                    const level2Data =
                    level2Snap.val();

                    await update(
                        ref(db,"users/"+level2Id),
                        {
                            balance:
                            (level2Data.balance||0)
                            + level2Commission,

                            totalCommission:
                            (level2Data.totalCommission||0)
                            + level2Commission
                        }
                    );

                    // LEVEL 3
                    if(level2Data.referredBy){

                        const level3Id =
                        level2Data.referredBy;

                        const level3Snap =
                        await get(
                        ref(db,"users/"+level3Id)
                        );

                        if(level3Snap.exists()){

                            const level3Data =
                            level3Snap.val();

                            await update(
                                ref(db,"users/"+level3Id),
                                {
                                    balance:
                                    (level3Data.balance||0)
                                    + level3Commission,

                                    totalCommission:
                                    (level3Data.totalCommission||0)
                                    + level3Commission
                                }
                            );
                        }
                    }
                }
            }
        }

        await update(
            ref(db,"users/"+request.uid),
            {
                firstDepositBonusGiven:true
            }
        );
    }
    // --- END OF NEW CODE ---

    await update(
        ref(db,"depositRequests/"+requestId),
        {
            status:"approved"
        }
    );

    alert("Deposit Approved");
}

// Step 4: Reject Deposit function
window.rejectDeposit = async function(requestId){

    await update(
        ref(db,"depositRequests/"+requestId),
        {
            status:"rejected"
        }
    );

    alert("Deposit Rejected");
}

// Step 1: Code replacing (Deposit requests list with Approve/Reject buttons)
const requestBox = document.getElementById("requestBox");

onValue(ref(db, "depositRequests"), (snapshot) => {
    requestBox.innerHTML = "";
    snapshot.forEach((child) => {
        const data = child.val();
        requestBox.innerHTML += `
        <div class="card">
            <p><b>UID:</b> ${data.uid}</p>
            <p><b>Amount:</b> ${data.amount}</p>
            <p><b>TRX:</b> ${data.trxId}</p>
            <p><b>Status:</b> ${data.status}</p>

            <button onclick="approveDeposit('${child.key}')">
                Approve
            </button>

            <button onclick="rejectDeposit('${child.key}')"
            style="background:red;margin-top:10px;">
                Reject
            </button>
        </div>
        `;
    });
});

const withdrawBox =
document.getElementById("withdrawBox");

onValue(ref(db,"withdrawRequests"),(snapshot)=>{

    withdrawBox.innerHTML = "";

    snapshot.forEach((child)=>{

        const data = child.val();

        withdrawBox.innerHTML += `
        <div class="card">
            <p><b>User UID:</b> ${data.uid}</p>
            <p><b>Amount:</b> ${data.amount}</p>
            <p><b>Method:</b> ${data.method}</p>
            <p><b>Account:</b> ${data.accountNumber}</p>
            <p><b>Status:</b> ${data.status}</p>

            <button
            onclick="approveWithdraw('${child.key}')">
            Mark Paid
            </button>

            <button
            onclick="rejectWithdraw('${child.key}')"
            style="background:red;margin-top:10px;">
            Reject
            </button>

        </div>
        `;
    });

});

window.approveWithdraw =
async function(requestId){

    await update(
        ref(db,
        "withdrawRequests/"+requestId),
        {
            status:"paid"
        }
    );

    alert("Withdraw Marked Paid");

}

window.rejectWithdraw =
async function(requestId){

    const requestSnap =
    await get(
    ref(db,
    "withdrawRequests/"+requestId)
    );

    if(!requestSnap.exists()) return;

    const request =
    requestSnap.val();

    const userSnap =
    await get(
    ref(db,
    "users/"+request.uid)
    );

    if(userSnap.exists()){

        const balance =
        userSnap.val().balance || 0;

        await update(
        ref(db,
        "users/"+request.uid),
        {
            balance:
            balance + request.amount
        });
    }

    await update(
    ref(db,
    "withdrawRequests/"+requestId),
    {
        status:"rejected"
    });

    alert("Withdraw Rejected & Balance Returned");

}

window.showDeposits = function(){

    document.getElementById("depositSection")
    .style.display = "block";

    document.getElementById("withdrawSection")
    .style.display = "none";

}

window.showWithdraws = function(){

    document.getElementById("depositSection")
    .style.display = "none";

    document.getElementById("withdrawSection")
    .style.display = "block";

}

</script>
</body>
</html>
