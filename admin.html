<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body{
background:#121212;
color:white;
font-family:Arial;
padding:20px;
}

.card{
background:#222;
padding:15px;
margin-bottom:15px;
border-radius:10px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
}

button{
width:100%;
padding:12px;
background:#10b981;
border:none;
color:white;
font-weight:bold;
cursor:pointer;
}
</style>

</head>
<body>

<h2>Admin Panel</h2>

<div class="card">
<input type="text" id="userUid" placeholder="User UID">

<input type="number" id="amount" placeholder="Amount">

<button onclick="addBalance()">
Add Balance
</button>
</div>
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

import {
getDatabase,
ref,
get,
update
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjw124Pc1wGpG1iNYGuKR9DmXo_OHCab8",
  authDomain: "winwave-b3ed4.firebaseapp.com",
  projectId: "winwave-b3ed4",
  storageBucket: "winwave-b3ed4.firebasestorage.app",
  messagingSenderId: "501831087781",
  appId: "1:501831087781:web:ea52d559bcb1429b9a3f4c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.addBalance = async function(){

    const uid =
    document.getElementById("userUid").value;

    const amount =
    Number(document.getElementById("amount").value);

    const snap =
    await get(ref(db,"users/"+uid));

    if(!snap.exists()){
        alert("User Not Found");
        return;
    }

    const currentBalance =
    snap.val().balance || 0;

    await update(
        ref(db,"users/"+uid),
        {
            balance: currentBalance + amount
        }
    );

    alert("Balance Added Successfully");
}

</script>
</body>
</html>
