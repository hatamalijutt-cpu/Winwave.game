<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel</title>

<style>
body { background: #121212; color: white; font-family: Arial; padding: 15px; }

/* Grid Layout: Boxes chhote kiye taake 1 line mein zyada aayein */
.grid-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 8px;
    margin-top: 15px;
}

.card {
    background: #222;
    padding: 10px;
    border-radius: 6px;
    border: 1px solid #333;
    font-size: 12px;
}

.card p { margin: 3px 0; }

input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }

button {
    width: 100%;
    padding: 8px;
    background: #10b981;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 4px;
    font-size: 12px;
}

.screenshot-btn {
    display: block;
    background: #f59e0b;
    color: #000;
    padding: 6px;
    margin: 8px 0;
    border-radius: 4px;
    text-decoration: none;
    font-size: 11px;
    text-align: center;
}

.view-btn { background: #3b82f6; margin-top: 5px; }

.details-box {
    display: none; 
    margin-top: 8px; 
    border-top: 1px dashed #555; 
    padding-top: 8px;
}

.uid-text { font-size: 10px; color: #a3a3a3; word-break: break-all; }
</style>

</head>
<body>

<h2>Admin Panel</h2>

<!-- Top Controls -->
<div style="display: flex; flex-wrap: wrap; gap: 10px;">
    <div class="card" style="flex: 1; min-width: 250px;">
        <h3>Referral Check</h3>
        <input type="text" id="checkUid" placeholder="User UID">
        <input type="date" id="reportDate">
        <button onclick="checkReferralDeposits()">Check</button>
        <div id="referralResult"></div>
    </div>
    <div class="card" style="flex: 1; min-width: 250px;">
        <h3>Add Balance</h3>
        <input type="text" id="userUid" placeholder="User UID">
        <input type="number" id="amount" placeholder="Amount">
        <button onclick="addBalance()">Add Balance</button>
    </div>
</div>

<div style="margin: 15px 0;">
    <button onclick="showDeposits()" style="width: auto; padding: 10px 20px;">Deposit Requests</button>
    <button onclick="showWithdraws()" style="width: auto; padding: 10px 20px;">Withdraw Requests</button>
</div>

<div id="depositSection">
    <h3>Deposit Requests</h3>
    <div id="requestBox" class="grid-container"></div> 
</div>

<div id="withdrawSection" style="display:none;">
    <h3>Withdraw Requests</h3>
    <div id="withdrawBox" class="grid-container"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getDatabase, ref, get, update, onValue, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjw124Pc1wGpG1iNYGuKR9DmXo_OHCab8",
  authDomain: "winwave-b3ed4.firebaseapp.com",
  projectId: "winwave-b3ed4",
  storageBucket: "winwave-b3ed4.firebasestorage.app",
  messagingSenderId: "501831087781",
  appId: "1:501831087781:web:ea52d559bcb1429b9a3f4c"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.toggleDetails = function(id) {
    const box = document.getElementById("details-" + id);
    box.style.display = (box.style.display === "none") ? "block" : "none";
}

// Logic for rendering grids
onValue(ref(db, "depositRequests"), (snapshot) => {
    const requestBox = document.getElementById("requestBox");
    requestBox.innerHTML = "";
    snapshot.forEach((child) => {
        const data = child.val();
        requestBox.innerHTML += `
        <div class="card">
            <p><b>RS ${data.amount}</b></p>
            <p>Status: ${data.status}</p>
            <button class="view-btn" onclick="toggleDetails('${child.key}')">View</button>
            <div id="details-${child.key}" class="details-box">
                <p><b>UID:</b></p>
                <p class="uid-text">${data.uid}</p>
                <p><b>TRX:</b> ${data.trxId}</p>
                <a href="${data.screenshotUrl}" target="_blank" class="screenshot-btn">View Pic</a>
                <button onclick="approveDeposit('${child.key}')">Approve</button>
                <button onclick="rejectDeposit('${child.key}')" style="background:red; margin-top:5px;">Reject</button>
            </div>
        </div>
        `;
    });
});

// Baqi functions (approveDeposit, rejectDeposit, etc.) wahi purane wale hain...
// Aap ne kaha tha change nahi karna, isliye wo sab yahan implied hain.
// Aap apni file mein purane wale functions niche continue kar sakte hain.

</script>
</body>
</html>
