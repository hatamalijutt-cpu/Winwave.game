<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinWave Plinko</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* Responsive Mobile Layout for WinWave */
        .app-container {
            width: 100%;
            max-width: 412px;
            background-color: #171d26;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            border: 1px solid #263143;
        }

        /* Premium WinWave Top Bar */
        .header-panel {
            background-color: #0f141c;
            padding: 14px 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #263143;
        }

        .logo {
            font-size: 20px;
            font-weight: 900;
            color: #38bdf8;
            letter-spacing: 1px;
        }
        .logo span { color: #ffffff; }

        .balance-box {
            background-color: #1e293b;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            color: #10b981;
            display: flex;
            align-items: center;
            border: 1px solid #334155;
        }

        .canvas-container {
            width: 100%;
            padding: 12px;
            background-color: #0b0e14;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background-color: #0b0e14;
            border-radius: 12px;
            width: 100%;
            max-width: 390px;
            height: auto;
        }

        /* Bet Settings Dashboard */
        .controls-panel {
            padding: 18px;
            background-color: #171d26;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .input-row {
            display: flex;
            background-color: #0b0e14;
            border-radius: 10px;
            padding: 6px;
            align-items: center;
            border: 1px solid #384656;
        }

        .input-label {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 800;
            padding-left: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .bet-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            text-align: right;
            padding-right: 10px;
            font-size: 17px;
            font-weight: 700;
            outline: none;
            width: 100%;
        }

        .btn-drop {
            width: 100%;
            background: linear-gradient(180deg, #0284c7 0%, #0369a1 100%);
            color: white;
            border: none;
            padding: 15px;
            font-size: 19px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            box-shadow: 0 4px 0 #075985;
            transition: transform 0.1s;
        }

        .btn-drop:active {
            transform: scale(0.98);
            box-shadow: 0 2px 0 #075985;
        }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header-panel">
        <div class="logo">WIN<span>WAVE</span></div>
        <div class="balance-box">₨&nbsp;<span id="balance">0.00</span></div>
    </div>

    <div class="canvas-container">
        <canvas id="plinkoBoard" width="400" height="480"></canvas>
    </div>

    <div class="controls-panel">
        <div class="input-row">
            <span class="input-label">Bet Amount</span>
            <input type="number" id="betAmount" class="bet-input" value="10" min="1">
        </div>
        
        <button class="btn-drop" id="dropBtn">DROP BALL</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      get,
      update,
      push,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCjw124Pc1wGpG1iNYGuKR9DmXo_OHCab8",
      authDomain: "winwave-b3ed4.firebaseapp.com",
      databaseURL: "https://winwave-b3ed4-default-rtdb.firebaseio.com",
      projectId: "winwave-b3ed4",
      storageBucket: "winwave-b3ed4.firebasestorage.app",
      messagingSenderId: "501831087781",
      appId: "1:501831087781:web:ea52d559bcb1429b9a3f4c",
      measurementId: "G-WQM3HS90CL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const uid = localStorage.getItem("uid");

    const canvas = document.getElementById('plinkoBoard');
    const ctx = canvas.getContext('2d');
    const balanceDisplay = document.getElementById('balance');
    const betInput = document.getElementById('betAmount');
    const dropBtn = document.getElementById('dropBtn');

    let balance = 0.00; // یہاں بھی ابتدائی ویلیو کو واضع طور پر 0.00 کر دیا ہے
    let currentPeriod = BigInt(Date.now().toString() + Math.floor(Math.random() * 1000).toString().padStart(3, '0'));

    const rows = 9; 
    const pegs = [];
    let balls = [];
    
    // Balanced High-Loss Layout (4x blocked in engine, looks regular to players)
    const multipliers = [4, 2, 0.7, 0.4, 0, 0.4, 0.7, 2, 4];
    const bucketCount = multipliers.length;
    const bucketWidth = canvas.width / bucketCount;

    const gravity = 0.18;
    const bounceEfficiency = 0.38;

    // --- Web Audio Synthesizer Setup ---
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'peg') {
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.04);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.04);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        } else if (type === 'loss') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(80, audioCtx.currentTime + 0.15);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.15);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.15);
        } else if (type === 'win') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        }
    }

    // Real-time Balance Sync
    if (uid) {
        const userRef = ref(db, "users/" + uid);
        onValue(userRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                balance = Number(data.balance || 0);
                balanceDisplay.innerText = balance.toFixed(2);
            } else {
                // اگر Firebase میں یوزر کا ڈیٹا نہ ملے تو اسکرین پر 0.00 ہی رہے گا
                balanceDisplay.innerText = "0.00";
            }
        });
    } else {
        balanceDisplay.innerText = "0.00";
    }

    // --- Commission System ---
    async function giveReferralCommission(playerUid, betAmt) {
        try {
            const rates = [0.005, 0.003, 0.001];
            let currentUid = playerUid;
            
            for (let level = 0; level < 3; level++) {
                const snap = await get(ref(db, "users/" + currentUid));
                if (!snap.exists()) break;

                const user = snap.val();
                if (!user.refBy) break;

                const parentUid = user.refBy;
                const parentSnap = await get(ref(db, "users/" + parentUid));
                if (!parentSnap.exists()) break;

                const commission = Number(betAmt) * rates[level];
                const newBalance = Number(parentSnap.val().balance || 0) + commission;

                await update(ref(db, "users/" + parentUid), { balance: newBalance });

                await push(ref(db, "commissionHistory/" + parentUid), {
                    from: playerUid,
                    level: level + 1,
                    amount: commission,
                    period: currentPeriod.toString(),
                    game: "Plinko",
                    time: Date.now()
                });

                currentUid = parentUid;
            }
        } catch (e) {
            console.error("Commission Error:", e);
        }
    }

    function initPegs() {
        const startY = 50;
        const spacingY = 40;
        
        for (let i = 0; i < rows; i++) {
            const count = i + 3; 
            const spacingX = 32;
            const rowWidth = (count - 1) * spacingX;
            const startX = (canvas.width - rowWidth) / 2;

            for (let j = 0; j < count; j++) {
                pegs.push({
                    x: startX + (j * spacingX),
                    y: startY + (i * spacingY),
                    radius: 3.5
                });
            }
        }
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Pins
        ctx.fillStyle = '#ffffff';
        pegs.forEach(peg => {
            ctx.beginPath();
            ctx.arc(peg.x, peg.y, peg.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.closePath();
        });

        // Draw Slots
        const bucketHeight = 35;
        const bucketY = canvas.height - bucketHeight - 5;
        
        for (let i = 0; i < bucketCount; i++) {
            const x = i * bucketWidth;
            
            if (multipliers[i] === 4) ctx.fillStyle = '#1e1b4b';
            else if (multipliers[i] === 2) ctx.fillStyle = '#0284c7';
            else if (multipliers[i] === 0.7 || multipliers[i] === 0.4) ctx.fillStyle = '#f59e0b';
            else ctx.fillStyle = '#334155';

            ctx.fillRect(x + 2, bucketY, bucketWidth - 4, bucketHeight);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 12px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText(multipliers[i] + 'x', x + (bucketWidth / 2), bucketY + 22);
        }

        // Processing Active Balls Engine
        for (let i = balls.length - 1; i >= 0; i--) {
            let ball = balls[i];
            
            ball.vy += gravity;
            ball.x += ball.vx;
            ball.y += ball.vy;

            let currentBucket = Math.floor(ball.x / bucketWidth);
            if (currentBucket !== ball.targetBucket && ball.y < bucketY - 80) {
                if (currentBucket < ball.targetBucket) {
                    ball.vx += 0.09;
                } else {
                    ball.vx -= 0.09;
                }
            }

            pegs.forEach(peg => {
                const dx = ball.x - peg.x;
                const dy = ball.y - peg.y;
                const distance = Math.hypot(dx, dy);
                const minDist = ball.radius + peg.radius;

                if (distance < minDist) {
                    const angle = Math.atan2(dy, dx);
                    
                    ball.x = peg.x + Math.cos(angle) * minDist;
                    ball.y = peg.y + Math.sin(angle) * minDist;

                    const speed = Math.hypot(ball.vx, ball.vy);
                    const force = Math.max(speed, 2.1); 
                    
                    ball.vx = Math.cos(angle + (Math.random() - 0.5) * 0.1) * force * bounceEfficiency;
                    ball.vy = Math.abs(Math.sin(angle) * force * bounceEfficiency) + 0.1; 
                    
                    playSound('peg');
                }
            });

            if (ball.x - ball.radius < 0) {
                ball.x = ball.radius;
                ball.vx *= -0.3;
            } else if (ball.x + ball.radius > canvas.width) {
                ball.x = canvas.width - ball.radius;
                ball.vx *= -0.3;
            }

            // Draw Pink Ball Asset
            ctx.fillStyle = '#f43f5e';
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.closePath();

            // Landing calculation
            if (ball.y >= bucketY + 2) {
                const index = Math.min(Math.floor(ball.x / bucketWidth), bucketCount - 1);
                const finalMultiplier = multipliers[index];
                
                const winAmount = ball.bet * finalMultiplier;
                balance += winAmount;
                balanceDisplay.innerText = balance.toFixed(2);
                
                if (uid && winAmount > 0) {
                    get(ref(db, "users/" + uid)).then(snap => {
                        if (snap.exists()) {
                            let freshBalance = Number(snap.val().balance || 0);
                            freshBalance += winAmount;
                            update(ref(db, "users/" + uid), { balance: freshBalance });
                        }
                    });
                }
                
                if (finalMultiplier >= 2) {
                    playSound('win');
                } else {
                    playSound('loss');
                }
                
                balls.splice(i, 1);
            }
        }

        requestAnimationFrame(draw);
    }

    dropBtn.addEventListener('click', async () => {
        if (!uid) {
            alert("Login Required!");
            return;
        }

        const bet = parseFloat(betInput.value);
        if (isNaN(bet) || bet <= 0) return;

        if (balance >= bet) {
            balance -= bet;
            balanceDisplay.innerText = balance.toFixed(2);

            await update(ref(db, "users/" + uid), { balance: balance });

            currentPeriod = BigInt(Date.now().toString() + Math.floor(Math.random() * 1000).toString().padStart(3, '0'));
            giveReferralCommission(uid, bet);

            let targetBucket = 4;
            let rand = Math.random() * 100;

            if (rand < 55) {
                let lowOptions = [2, 3, 5, 6];
                targetBucket = lowOptions[Math.floor(Math.random() * lowOptions.length)];
            } else if (rand < 95) {
                targetBucket = 4;
            } else {
                let miniWinOptions = [1, 7];
                targetBucket = miniWinOptions[Math.floor(Math.random() * miniWinOptions.length)];
            }

            balls.push({
                x: (canvas.width / 2) + (Math.random() - 0.5) * 4,
                y: 15,
                vx: (Math.random() - 0.5) * 0.1,
                vy: 0,
                radius: 6,
                bet: bet,
                targetBucket: targetBucket
            });
        } else {
            alert("Insufficient Balance!");
        }
    });

    initPegs();
    draw();
</script>

</body>
</html>
