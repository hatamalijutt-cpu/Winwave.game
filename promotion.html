<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotion - Winwave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #ffffff; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background-color: #1a1a1a; min-height: 100vh; padding-bottom: 80px; }

        /* Header */
        .header { background: #1e1e1e; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; border-bottom: 1px solid #333; }
        
        /* Date Picker Section */
        .date-filter-box { padding: 15px 20px 0; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .date-filter-box label { color: #a3a3a3; font-size: 14px; font-weight: bold; }
        .date-filter-box input { background: #262626; color: #10b981; border: 1px solid #444; padding: 8px 12px; border-radius: 8px; outline: none; font-weight: bold; cursor: pointer; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .stat-card { background: #262626; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-val { font-size: 20px; color: #10b981; font-weight: bold; margin-bottom: 5px; }
        .stat-label { font-size: 12px; color: #a3a3a3; }

        /* Referral Link Section */
        .referral-box { background: #262626; margin: 0 20px 20px 20px; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .ref-input { width: 100%; background: #121212; border: 1px solid #444; padding: 12px; color: white; border-radius: 8px; margin-top: 10px; text-align: center; }
        
        /* Promotion Action Buttons */
        .action-btns { display: flex; flex-direction: column; gap: 10px; padding: 0 20px; }
        .btn-green { background: #10b981; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; cursor: pointer; text-decoration: none; color: white; display: block; }
        
        /* Bottom Nav (Consistent) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background-color: #1e1e1e; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #2a2a2a; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #a3a3a3; text-decoration: none; font-size: 11px; gap: 4px; }
        .nav-item.active { color: #10b981; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">Promotion</header>

        <div class="date-filter-box">
            <label for="datePicker">Select Date:</label>
            <input type="date" id="datePicker">
        </div>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-val" id="totalBonus">RS 0.00</div>
                <div class="stat-label">Total Bonus</div>
            </div>

            <div class="stat-card">
                <div class="stat-val" id="totalReferrals">0</div>
                <div class="stat-label">Total Referrals</div>
            </div>

            <div class="stat-card">
                <div class="stat-val" id="validMembers">0</div>
                <div class="stat-label">Valid Members</div>
            </div>

            <div class="stat-card">
                <div class="stat-val" id="invalidMembers">0</div>
                <div class="stat-label">Invalid Members</div>
            </div>

            <div class="stat-card">
                <div class="stat-val" id="firstDepositTotal">RS 0</div>
                <div class="stat-label">First Deposit Total</div>
            </div>

            <div class="stat-card">
                <div class="stat-val" id="teamDepositTotal">RS 0</div>
                <div class="stat-label">Team Deposit Total</div>
            </div>
        </div>

        <div class="referral-box">
            <div style="font-size: 14px; text-align: center;">Your Invite Link:</div>
            <input type="text" class="ref-input" id="inviteLink" readonly>
        </div>

        <div class="action-btns">
            <div class="btn-green" onclick="copyInviteLink()">Copy Invite Link</div>
            <a href="history.html" class="btn-green" style="background:#3b82f6;">History</a>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fa-solid fa-house"></i> <span>Home</span>
            </a>
            <a href="promotion.html" class="nav-item active">
                <i class="fa-solid fa-gift"></i> <span>Promotion</span>
            </a>
            <a href="earn.html" class="nav-item">
                <i class="fa-solid fa-circle-dollar-to-slot" style="font-size: 22px; color: #10b981;"></i> <span>Earn</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-volleyball"></i> <span>Sports</span>
            </a>
            <a href="deposit.html" class="nav-item">
                <i class="fa-solid fa-wallet"></i> <span>Wallet</span>
            </a>
        </nav>
    </div>

<script>
// Copy Link
function copyInviteLink(){
    let link = document.getElementById("inviteLink").value;
    navigator.clipboard.writeText(link);
    alert("Invite Link Copied Successfully!");
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyCjw124Pc1wGpG1iNYGuKR9DmXo_OHCab8", 
    authDomain: "winwave-b3ed4.firebaseapp.com",
    projectId: "winwave-b3ed4",
    storageBucket: "winwave-b3ed4.firebasestorage.app",
    messagingSenderId: "501831087781",
    appId: "1:501831087781:web:ea52d559bcb1429b9a3f4c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

onAuthStateChanged(auth, (user) => {

    if(!user){
        alert("Please Login First");
        return;
    }

    const uid = user.uid;
    document.getElementById("inviteLink").value = "https://hatamalijutt-cpu.github.io/Winwave.game/index.html?ref=" + uid;

    const datePicker = document.getElementById("datePicker");
    
    // Default aaj ki date set karna
    const today = new Date().toISOString().split('T')[0];
    datePicker.value = today;

    // Data Load Karne Ka Main Function (Selected Date Ke Hisab Se)
    function loadStatsForDate(selectedDate) {
        
        // Pura data pehle reset karte hain (0 karte hain) takay naya data theek dikhe
        document.getElementById("totalReferrals").innerText = 0;
        document.getElementById("validMembers").innerText = 0;
        document.getElementById("invalidMembers").innerText = 0;
        document.getElementById("firstDepositTotal").innerText = "RS 0";
        document.getElementById("teamDepositTotal").innerText = "RS 0";
        document.getElementById("totalBonus").innerText = "RS 0.00";

        let totalBetCommission = 0;
        let referralBonus = 0;

        function updateTotalBonusUI() {
            const combinedBonus = totalBetCommission + referralBonus;
            document.getElementById("totalBonus").innerText = "RS " + combinedBonus.toFixed(2);
        }

        // 1. Referrals Filter Logic
        const referralsRef = ref(db, "users/" + uid + "/referrals");
        get(referralsRef).then(async (snapshot) => {
            const data = snapshot.val();
            if(!data) return;

            const referralIds = Object.keys(data);
            let validCount = 0;
            let invalidCount = 0;
            let dailyReferrals = 0;

            for(const referralUid of referralIds){
                const memberSnap = await get(ref(db,"users/"+referralUid));
                if(memberSnap.exists()){
                    const memberData = memberSnap.val();
                    
                    // Database me 'date' ya 'joinDate' hona lazmi hai tabhi filter kaam karega
                    // Yahan assume kiya hai k aap ne 'date' field store ki hui hai e.g "2026-06-28"
                    let memberDate = memberData.date || memberData.joinDate || "";

                    // Agar database ki date aur user ki select ki hui date same hai
                    if(memberDate.startsWith(selectedDate)) {
                        dailyReferrals++;
                        if(memberData.firstDepositBonusGiven){
                            validCount++;
                        } else {
                            invalidCount++;
                        }
                    }
                }
            }

            document.getElementById("totalReferrals").innerText = dailyReferrals;
            document.getElementById("validMembers").innerText = validCount;
            document.getElementById("invalidMembers").innerText = invalidCount;
        });

        // 2. Commission History Logic
        const commRef = ref(db, "commissionHistory/" + uid);
        get(commRef).then((snapshot) => {
            totalBetCommission = 0;
            if(snapshot.exists()) {
                snapshot.forEach((child) => {
                    let commData = child.val();
                    let commDate = commData.date || (commData.timestamp ? new Date(commData.timestamp).toISOString().split('T')[0] : "");
                    
                    if (commDate.startsWith(selectedDate)) {
                        totalBetCommission += Number(commData.amount || 0);
                    }
                });
            }
            updateTotalBonusUI();
        });

        // 3. User Table Totals (Deposits)
        const userRef = ref(db, "users/" + uid);
        get(userRef).then((snapshot)=>{
            const data = snapshot.val();
            if(data){
                /* NOTE FOR DEV: Agar aap 'firstDepositAmount' aur 'teamDepositTotal' me sirf
                 zindagi bhar ka total jama kar rahay hain (overall sum), tou wo filter nahi ho sakta.
                 Agar aap ne unki detail har din ke hisaab se save ki hai (e.g., dailyDeposits[date]),
                 to wo logic yahan aaye gi. Abhi ke liye purani logic ko adjust kiya hai taake crash na ho.
                */

                referralBonus = Number(data.referralBonus || 0);
                updateTotalBonusUI();
                
                document.getElementById("firstDepositTotal").innerText = "RS " + (data.firstDepositAmount || 0);
                document.getElementById("teamDepositTotal").innerText = "RS " + (data.teamDepositTotal || 0);
            }
        });
    }

    // Jab user Date Picker se date change kare tou ye code chalay
    datePicker.addEventListener("change", (event) => {
        loadStatsForDate(event.target.value);
    });

    // Pehli dafa page load hone par aaj (today) ka data load karna
    loadStatsForDate(today);
});
</script>
</body>
</html>
