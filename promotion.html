<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Promotion - Winwave</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #ffffff; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background-color: #1a1a1a; min-height: 100vh; padding-bottom: 80px; }

        /* Header */
        .header { background: #1e1e1e; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; border-bottom: 1px solid #333; }
        
        /* Date Filter Section */
        .filter-section { display: flex; gap: 10px; padding: 20px 20px 0 20px; }
        .date-input { flex: 1; background: #121212; border: 1px solid #444; padding: 12px; color: white; border-radius: 8px; }
        .btn-search { background: #10b981; border: none; padding: 12px 20px; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

        /* Stats Section */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .stat-card { background: #262626; padding: 15px; border-radius: 12px; text-align: center; border: 1px solid #333; }
        .stat-val { font-size: 20px; color: #10b981; font-weight: bold; margin-bottom: 5px; }
        .stat-label { font-size: 12px; color: #a3a3a3; }

        /* Referral Link Section */
        .referral-box { background: #262626; margin: 0 20px 20px 20px; padding: 20px; border-radius: 12px; border: 1px solid #333; }
        .ref-input { width: 100%; background: #121212; border: 1px solid #444; padding: 12px; color: white; border-radius: 8px; margin-top: 10px; text-align: center; }
        
        /* Promotion Action Buttons */
        .action-btns { display: flex; flex-direction: column; gap: 10px; padding: 0 20px; }
        .btn-green { background: #10b981; padding: 15px; border-radius: 8px; text-align: center; font-weight: bold; cursor: pointer; text-decoration: none; color: white; display: block; }
        
        /* Bottom Nav (Consistent) */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; max-width: 450px; background-color: #1e1e1e; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #2a2a2a; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #a3a3a3; text-decoration: none; font-size: 11px; gap: 4px; }
        .nav-item.active { color: #10b981; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="header">Promotion</header>

        <div class="filter-section">
            <input type="date" id="filterDate" class="date-input">
            <button class="btn-search" onclick="fetchDailyStats()">Search</button>
        </div>
        <div style="text-align: center; font-size: 12px; color: #a3a3a3; margin-top: 5px;" id="statusText">Showing Lifetime Data</div>

        <div class="stats-grid">

            <div class="stat-card">
                <div class="stat-val" id="totalBonus">RS 0.00</div>
                <div class="stat-label">Bonus</div>
            </div>

            <div class="stat-card">
                <div class="stat-val" id="totalReferrals">0</div>
                <div class="stat-label">Referrals</div>
            </div>

            <div class="stat-card">
                <div class="stat-val" id="validMembers">0</div>
                <div class="stat-label">Valid Members</div>
            </div>

            <div class="stat-card">
                <div class="stat-val" id="invalidMembers">0</div>
                <div class="stat-label">Invalid Members</div>
            </div>

            <div class="stat-card">
                <div class="stat-val" id="firstDepositTotal">RS 0</div>
                <div class="stat-label">First Deposit Total</div>
            </div>

            <div class="stat-card">
                <div class="stat-val" id="teamDepositTotal">RS 0</div>
                <div class="stat-label">Team Deposit Total</div>
            </div>

        </div>

        <div class="referral-box">
            <div style="font-size: 14px; text-align: center;">Your Invite Link:</div>
            <input type="text" class="ref-input" id="inviteLink" readonly>
        </div>

        <div class="action-btns">
            <div class="btn-green" onclick="copyInviteLink()">Copy Invite Link</div>
            <a href="history.html" class="btn-green" style="background:#3b82f6;">History</a>
        </div>

        <nav class="bottom-nav">
            <a href="index.html" class="nav-item">
                <i class="fa-solid fa-house"></i> <span>Home</span>
            </a>
            <a href="promotion.html" class="nav-item active">
                <i class="fa-solid fa-gift"></i> <span>Promotion</span>
            </a>
            <a href="earn.html" class="nav-item">
                <i class="fa-solid fa-circle-dollar-to-slot" style="font-size: 22px; color: #10b981;"></i> <span>Earn</span>
            </a>
            <a href="#" class="nav-item">
                <i class="fa-solid fa-volleyball"></i> <span>Sports</span>
            </a>
            <a href="deposit.html" class="nav-item">
                <i class="fa-solid fa-wallet"></i> <span>Wallet</span>
            </a>
        </nav>
    </div>

<script>
function copyInviteLink(){
    let link = document.getElementById("inviteLink").value;
    navigator.clipboard.writeText(link);
    alert("Invite Link Copied Successfully!");
}
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import {
  getDatabase,
  ref,
  get,
  onValue
} from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCjw124Pc1wGpG1iNYGuKR9DmXo_OHCab8", 
  authDomain: "winwave-b3ed4.firebaseapp.com",
  projectId: "winwave-b3ed4",
  storageBucket: "winwave-b3ed4.firebasestorage.app",
  messagingSenderId: "501831087781",
  appId: "1:501831087781:web:ea52d559bcb1429b9a3f4c"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

let currentUserUid = null;

// Helper Function: Recursion se team nikalna (Admin panel wali logic)
async function getTeamMembers(uid){
    let members = [];
    const referralsSnap = await get(ref(db, "users/" + uid + "/referrals"));
    if(!referralsSnap.exists()) return members;
    
    const referrals = referralsSnap.val();
    for(const childUid in referrals){
        members.push(childUid);
        const childMembers = await getTeamMembers(childUid);
        members = members.concat(childMembers);
    }
    return members;
}

onAuthStateChanged(auth, (user) => {
    if(!user){
        alert("Please Login First");
        return;
    }

    currentUserUid = user.uid;
    document.getElementById("inviteLink").value = "https://hatamalijutt-cpu.github.io/Winwave.game/index.html?ref=" + currentUserUid;

    // Load Lifetime stats by default on page load
    loadLifetimeStats();
});

function loadLifetimeStats() {
    const uid = currentUserUid;
    document.getElementById("statusText").innerText = "Showing Lifetime Data";
    
    // 1. Referrals Data (Lifetime)
    onValue(ref(db, "users/" + uid + "/referrals"), async (snapshot)=>{
        const data = snapshot.val();
        if(!data){
            document.getElementById("totalReferrals").innerText = 0;
            document.getElementById("validMembers").innerText = 0;
            document.getElementById("invalidMembers").innerText = 0;
            return;
        }

        const referralIds = Object.keys(data);
        document.getElementById("totalReferrals").innerText = referralIds.length;

        let validCount = 0, invalidCount = 0;
        for(const referralUid of referralIds){
            const memberSnap = await get(ref(db,"users/"+referralUid));
            if(memberSnap.exists()){
                const memberData = memberSnap.val();
                if(memberData.firstDepositBonusGiven) validCount++;
                else invalidCount++;
            }
        }
        document.getElementById("validMembers").innerText = validCount;
        document.getElementById("invalidMembers").innerText = invalidCount;
    });

    // 2. Commission & Deposit Totals (Lifetime)
    let totalBetCommission = 0;
    let referralBonus = 0;
    
    onValue(ref(db, "commissionHistory/" + uid), (snapshot) => {
        totalBetCommission = 0;
        if(snapshot.exists()) {
            snapshot.forEach((child) => {
                totalBetCommission += Number(child.val().amount || 0);
            });
        }
    });

    onValue(ref(db, "users/" + uid), (snapshot)=>{
        const data = snapshot.val();
        if(data){
            referralBonus = Number(data.referralBonus || 0);
            document.getElementById("totalBonus").innerText = "RS " + (totalBetCommission + referralBonus).toFixed(2);
            document.getElementById("firstDepositTotal").innerText = "RS " + (data.firstDepositAmount || 0);
            document.getElementById("teamDepositTotal").innerText = "RS " + (data.teamDepositTotal || 0);
        }
    });
}

// --- NEW FUNCTION: DATE-WISE SEARCH ---
window.fetchDailyStats = async function() {
    const selectedDate = document.getElementById("filterDate").value;
    if(!selectedDate) {
        alert("Please select a date first.");
        return;
    }

    document.getElementById("statusText").innerText = "Loading data for " + selectedDate + "...";
    
    const uid = currentUserUid;
    
    // Daily Variables
    let dailyBonus = 0;
    let dailyTeamDeposit = 0;
    let dailyFirstDepositAmount = 0;
    let dailyValidMembers = 0; // Members who made their first deposit on this date

    // 1. Calculate Daily Bonus from Commission History
    const commSnap = await get(ref(db, "commissionHistory/" + uid));
    if(commSnap.exists()) {
        commSnap.forEach((child) => {
            const item = child.val();
            // Checking if the commission timestamp matches the selected date
            if(item.date) {
                const commDate = new Date(item.date).toLocaleDateString("en-CA", { timeZone: "Asia/Karachi" });
                if(commDate === selectedDate) {
                    dailyBonus += Number(item.amount || 0);
                }
            }
        });
    }

    // 2. Calculate Team Deposits for the selected date
    const teamMembers = await getTeamMembers(uid);
    
    for(const memberUid of teamMembers) {
        const historySnap = await get(ref(db, "depositHistory/" + memberUid));
        
        if(historySnap.exists()) {
            historySnap.forEach((h) => {
                const dep = h.val();
                if(dep.date) {
                    const depositDate = new Date(dep.date).toLocaleDateString("en-CA", { timeZone: "Asia/Karachi" });
                    
                    if(depositDate === selectedDate) {
                        dailyTeamDeposit += Number(dep.amount || 0);
                        
                        if(dep.isFirstDeposit) {
                            dailyFirstDepositAmount += Number(dep.amount || 0);
                            dailyValidMembers++;
                        }
                    }
                }
            });
        }
    }

    // Note: Finding EXACT daily new registered referrals requires saving a 'registerDate' in the user node.
    // If you don't have it, we show N/A for today's new registrations to avoid wrong data.

    // Update UI with Daily Data
    document.getElementById("totalBonus").innerText = "RS " + dailyBonus.toFixed(2);
    document.getElementById("teamDepositTotal").innerText = "RS " + dailyTeamDeposit;
    document.getElementById("firstDepositTotal").innerText = "RS " + dailyFirstDepositAmount;
    document.getElementById("validMembers").innerText = dailyValidMembers;
    document.getElementById("totalReferrals").innerText = "N/A"; 
    document.getElementById("invalidMembers").innerText = "N/A";
    
    document.getElementById("statusText").innerText = "Showing Data for: " + selectedDate;
    document.getElementById("statusText").style.color = "#10b981";
}
</script>
</body>
</html>
