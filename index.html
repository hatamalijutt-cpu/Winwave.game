<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Winwave Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
        }

        /* Mobile Responsive Container */
        .app-container {
            width: 100%;
            max-width: 450px;
            background-color: #1a1a1a;
            min-height: 100vh;
            position: relative;
            padding-bottom: 70px;
        }

        /* Top Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background-color: #1e1e1e;
            border-bottom: 1px solid #2a2a2a;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-name {
            font-size: 20px;
            font-weight: bold;
            color: #10b981; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Header Right Section */
        .header-right {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Wallet Info Box */
        .wallet-info {
            background-color: #2a2a2a;
            padding: 6px 12px;
            border-radius: 20px;
            display: none; 
            align-items: center;
            gap: 5px;
            font-weight: 600;
            color: #f59e0b;
            font-size: 14px;
            text-decoration: none;
        }

        /* User Profile Section */
        .user-profile {
            display: none; 
            position: relative;
            align-items: center;
            cursor: pointer;
            text-decoration: none;
        }

        .user-profile img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid #10b981;
            object-fit: cover;
        }

        .vip-badge {
            position: absolute;
            bottom: -4px;
            right: -4px;
            background-color: #ef4444;
            color: white;
            font-size: 8px;
            font-weight: bold;
            padding: 1px 3px;
            border-radius: 4px;
            border: 1px solid #1e1e1e;
        }

        /* Auth Buttons Style */
        .auth-buttons {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            text-decoration: none;
        }

        .btn-login {
            background-color: transparent;
            color: #ffffff;
            border: 1px solid #444;
        }

        .btn-register {
            background-color: #10b981;
            color: #ffffff;
        }

        /* Auto Sliding Banner Style */
        .slider-container {
            margin: 15px;
            border-radius: 12px;
            overflow: hidden;
            position: relative;
            height: 160px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        }

        .slider-wrapper {
            display: flex;
            width: 600%; 
            height: 100%;
            transition: transform 0.5s ease-in-out;
        }

        .slide {
            width: 16.666%; 
            height: 100%;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Main Categories */
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            padding: 0 15px;
            margin-bottom: 20px;
        }

        .category-card {
            background-color: #262626;
            border-radius: 10px;
            padding: 12px 5px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #333;
        }

        .category-card:hover {
            background-color: #323232;
            border-color: #10b981;
        }

        .category-card i {
            font-size: 22px;
            margin-bottom: 8px;
            display: block;
        }

        .cat-hot { color: #ef4444; }
        .cat-slot { color: #f59e0b; }
        .cat-live { color: #3b82f6; }
        .cat-sport { color: #10b981; }

        .category-card span {
            font-size: 12px;
            color: #d4d4d4;
            font-weight: 500;
        }

        /* Games Section Label */
        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 15px;
            margin-bottom: 12px;
        }

        .section-title h3 {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #f3f4f6;
        }

        .section-title a {
            color: #10b981;
            text-decoration: none;
            font-size: 13px;
        }

        /* Games Grid */
        .games-section {
            padding: 0 15px;
            margin-bottom: 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .games-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            width: 100%;
        }

        .game-card-box {
            background-color: #262626;
            border-radius: 12px;
            width: 150px;
            height: 150px;
            position: relative;
            overflow: hidden;
            border: 1px solid #333;
            cursor: pointer;
        }

        .game-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .hot-tag {
            position: absolute;
            top: 0;
            left: 0;
            background-color: #ef4444;
            color: white;
            font-size: 9px;
            padding: 2px 6px;
            font-weight: bold;
            border-bottom-right-radius: 6px;
            text-transform: uppercase;
            z-index: 2;
        }

        /* Bottom Navigation */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 450px;
            background-color: #1e1e1e;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            border-top: 1px solid #2a2a2a;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #a3a3a3;
            text-decoration: none;
            font-size: 11px;
            gap: 4px;
        }

        .nav-item.active {
            color: #10b981;
        }

        .nav-item i {
            font-size: 18px;
        }

        /* Auth Modal */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.85);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-box {
            background-color: #1e1e1e;
            width: 100%;
            max-width: 380px;
            border-radius: 16px;
            padding: 25px;
            border: 1px solid #2a2a2a;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 18px;
            color: #a3a3a3;
            cursor: pointer;
        }

        .modal-tabs {
            display: flex;
            border-bottom: 2px solid #2a2a2a;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: none;
            border: none;
            color: #a3a3a3;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-align: center;
        }

        .tab-btn.active {
            color: #10b981;
            border-bottom: 2px solid #10b981;
            margin-bottom: -2px;
        }

        .form-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 12px;
            color: #a3a3a3;
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 12px;
            color: #666;
            font-size: 14px;
        }

        .input-wrapper input {
            width: 100%;
            background-color: #121212;
            border: 1px solid #333;
            padding: 12px 12px 12px 38px;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
        }

        .input-wrapper input:focus {
            border-color: #10b981;
        }

        .submit-btn {
            width: 100%;
            background-color: #10b981;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .switch-prompt {
            text-align: center;
            font-size: 13px;
            color: #a3a3a3;
            margin-top: 15px;
        }

        .switch-prompt span {
            color: #10b981;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>

    <script>
        // --- Auto Slider Script ---
        const sliderWrapper = document.getElementById('sliderWrapper');
        let currentIndex = 0;
        const totalSlides = 6;

        function autoSlide() {
            currentIndex++;
            if (currentIndex >= totalSlides) {
                currentIndex = 0;
            }
            sliderWrapper.style.transform = `translateX(-${currentIndex * 16.666}%)`;
        }
        setInterval(autoSlide, 3000);

        // --- Authentication Script ---
        const authModal = document.getElementById('authModal');
        const loginTab = document.getElementById('loginTab');
        const registerTab = document.getElementById('registerTab');
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        
        const authButtons = document.getElementById('authButtons');
        const walletBox = document.getElementById('walletBox');
        const userProfile = document.getElementById('userProfile');

        function openAuthModal(type) {
            authModal.style.display = 'flex';
            switchTab(type);
        }

        function closeAuthModal() {
            authModal.style.display = 'none';
        }

        function switchTab(type) {
            if (type === 'login') {
                loginTab.classList.add('active');
                registerTab.classList.remove('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                registerTab.classList.add('active');
                loginTab.classList.remove('active');
                registerForm.style.display = 'block';
                loginForm.style.display = 'none';
            }
        }

        function handleAuthSuccess() {
            closeAuthModal();
            authButtons.style.display = 'none';
            walletBox.style.display = 'flex';
            userProfile.style.display = 'flex';
        }

        async function registerUser() {
            const urlParams = new URLSearchParams(window.location.search);
            const referralUid = urlParams.get("ref");

            const email = document.getElementById("regEmail").value;
            const password = document.getElementById("regPassword").value;
            const confirmPassword = document.getElementById("regConfirmPassword").value;
            
            const inviteCode = document.getElementById("inviteCode").value;
            // STEP 2: registerUser() function modify kiya
            const referralId = localStorage.getItem("referralId");

            if (!email || !password || !confirmPassword) {
                alert("Sab fields fill karo");
                return;
            }

            if (password !== confirmPassword) {
                alert("Passwords match nahi karte");
                return;
            }

            try {
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // STEP 3: user create hone ke baad Replace kiya
                await set(ref(db, 'users/' + user.uid), {
                    email: email,
                    balance: 0,
                    vip: "VIP1",
                    referralCode: user.uid.substring(0,6),
                    referredBy: referralUid || inviteCode || ""
                });

                if(referralUid){
                    await set(
                        ref(db, "users/" + referralUid + "/referrals/" + user.uid),
                        {
                            email: email,
                            joinedAt: Date.now()
                        }
                    );
                }

                const referrerSnapshot = await get(ref(db, "users/" + referralUid));

                if(referrerSnapshot.exists()){

                    const referrerData = referrerSnapshot.val();

                    // LEVEL 2
                    if(referrerData.referredBy){

                        await set(
                            ref(
                                db,
                                "users/" +
                                referrerData.referredBy +
                                "/level2Referrals/" +
                                user.uid
                            ),
                            {
                                email: email,
                                joinedAt: Date.now()
                            }
                        );

                        const level2Snapshot =
                        await get(ref(db,
                        "users/" + referrerData.referredBy));

                        if(level2Snapshot.exists()){

                            const level2Data =
                            level2Snapshot.val();

                            // LEVEL 3
                            if(level2Data.referredBy){

                                await set(
                                    ref(
                                        db,
                                        "users/" +
                                        level2Data.referredBy +
                                        "/level3Referrals/" +
                                        user.uid
                                    ),
                                    {
                                        email: email,
                                        joinedAt: Date.now()
                                    }
                                );

                            }
                        }
                    }
                }

                if(referralUid){
                    const bonusSnapshot = await get(ref(db,"users/" + referralUid));
                    if(bonusSnapshot.exists()){
                        const bonusData = bonusSnapshot.val();
                        const currentBonus = bonusData.referralBonus || 0;
                        await set(
                            ref(db,"users/" + referralUid + "/referralBonus"),
                            currentBonus + 100
                        );
                    }
                }

                // Existing logic for inviteCode 
                if(inviteCode){
                    const usersRef = ref(db, "users");
                    const snapshot = await get(usersRef);
                    if(snapshot.exists()){
                        const users = snapshot.val();
                        for(let uid in users){
                            if(users[uid].referralCode === inviteCode){
                                let totalRefs = users[uid].referrals || 0;
                                let totalBonus = users[uid].referralBonus || 0;
                                
                                await update(
                                    ref(db,"users/"+uid),
                                    {
                                        referrals: totalRefs + 1,
                                        referralBonus: totalBonus + 100
                                    }
                                );
                                break;
                            }
                        }
                    }
                }

                alert("Account Successfully Created!");

                closeAuthModal();
                authButtons.style.display = "none";
                walletBox.style.display = "flex";
                userProfile.style.display = "flex";

            } catch (error) {
                alert(error.message);
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";
        import {
          getAuth,
          createUserWithEmailAndPassword,
          signInWithEmailAndPassword,
          onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        // STEP 5: get function verify/import kiya
        import {
          getDatabase,
          ref,
          set,
          get,
          onValue,
          update
        } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCjw124Pc1wGpG1iNYGuKR9DmXo_OHCab8",
          authDomain: "winwave-b3ed4.firebaseapp.com",
          projectId: "winwave-b3ed4",
          storageBucket: "winwave-b3ed4.firebasestorage.app",
          messagingSenderId: "501831087781",
          appId: "1:501831087781:web:ea52d559bcb1429b9a3f4c",
          measurementId: "G-WQM3HS90CL"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // STEP 1: Firebase initialize hone ke baad ye code add kiya
        const urlParams = new URLSearchParams(window.location.search);
        const referralId = urlParams.get("ref");
        if(referralId){
            localStorage.setItem("referralId", referralId);
        }

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById("authButtons").style.display = "none";
                document.getElementById("walletBox").style.display = "flex";
                document.getElementById("userProfile").style.display = "flex";

                const balanceRef = ref(db, "users/" + user.uid);

                onValue(balanceRef, (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        document.querySelector("#walletBox span").innerText =
                            "RS " + data.balance;
                    }
                });
            } else {
                document.getElementById("authButtons").style.display = "flex";
                document.getElementById("walletBox").style.display = "none";
                document.getElementById("userProfile").style.display = "none";
            }
        });

        window.auth = auth;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        
        window.db = db;

        window.set = set;
        window.get = get;
        window.update = update;
