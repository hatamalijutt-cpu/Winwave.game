<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WinWave Chicken Road</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            background-color: #0b0e14;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        .app-container {
            width: 100%;
            max-width: 412px;
            background-color: #171d26;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            border: 1px solid #263143;
        }

        /* --- Standard WinWave Header --- */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            background-color: #231223;
            border-bottom: 2px solid #ef4444;
        }

        .back-btn {
            color: #a3a3a3;
            text-decoration: none;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .game-title {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #ef4444, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        .wallet-display {
            background-color: #341a34;
            padding: 5px 12px;
            border-radius: 15px;
            color: #f59e0b;
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            border: 1px solid #d97706;
        }

        /* Road Game Area */
        .game-screen {
            background-color: #1e293b;
            height: 320px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column-reverse;
        }

        .lane {
            flex: 1;
            border-bottom: 1px dashed #334155;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background-color: #273549;
        }

        .lane.safe-zone {
            background-color: #0f172a;
            border-bottom: 2px solid #38bdf8;
        }

        .lane-multiplier {
            font-size: 14px;
            font-weight: 800;
            color: #94a3b8;
            background: #0f141c;
            padding: 2px 8px;
            border-radius: 4px;
        }

        .lane.active .lane-multiplier {
            color: #38bdf8;
            border: 1px solid #38bdf8;
        }

        /* Game Elements */
        .chicken {
            font-size: 28px;
            position: absolute;
            bottom: 10px;
            left: 45%;
            transition: all 0.2s ease;
            z-index: 10;
        }

        .car {
            font-size: 24px;
            position: absolute;
            right: -50px;
            transition: transform 0.6s linear;
            z-index: 5;
        }

        /* Message Display Overlay */
        .status-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 32px;
            font-weight: 900;
            color: #ef4444;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            display: none;
            z-index: 20;
        }

        /* Controls Panel */
        .controls-panel {
            padding: 18px;
            background-color: #171d26;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-row {
            display: flex;
            background-color: #0b0e14;
            border-radius: 10px;
            padding: 6px;
            align-items: center;
            border: 1px solid #384656;
        }

        .input-label {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 800;
            padding-left: 10px;
            text-transform: uppercase;
        }

        .bet-input {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            text-align: right;
            padding-right: 10px;
            font-size: 17px;
            font-weight: 700;
            outline: none;
            width: 100%;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
        }

        .btn-main {
            flex: 1;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn-go {
            background: linear-gradient(180deg, #10b981 0%, #059669 100%);
            box-shadow: 0 4px 0 #047857;
        }

        .btn-cashout {
            background: linear-gradient(180deg, #f59e0b 0%, #d97706 100%);
            box-shadow: 0 4px 0 #b45309;
        }

        .btn-main:disabled {
            background: #475569 !important;
            box-shadow: 0 4px 0 #334155 !important;
            cursor: not-allowed;
        }

        .btn-main:active:not(:disabled) {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="app-container">
    
    <header class="game-header">
        <a href="index.html" class="back-btn">
            <i class="fa-solid fa-chevron-left"></i>
        </a>
        <div class="game-title">Chicken Road</div>
        <div class="wallet-display">
            <i class="fa-solid fa-wallet"></i>
            <span id="balance">RS 0.00</span>
        </div>
    </header>

    <div class="game-screen" id="gameScreen">
        <div class="status-overlay" id="statusOverlay">CRASHED!</div>
        
        <div class="lane safe-zone">
            <span style="color: #64748b; font-size: 12px; font-weight: bold;">START ZONE</span>
        </div>
        
        <div class="lane" id="lane1"><span class="lane-multiplier">1.20x</span></div>
        <div class="lane" id="lane2"><span class="lane-multiplier">1.50x</span></div>
        <div class="lane" id="lane3"><span class="lane-multiplier">2.00x</span></div>
        <div class="lane" id="lane4"><span class="lane-multiplier">3.00x</span></div>
        <div class="lane" id="lane5"><span class="lane-multiplier">5.00x</span></div>

        <div class="chicken" id="chicken">🐔</div>
    </div>

    <div class="controls-panel">
        <div class="input-row">
            <span class="input-label">Bet Amount</span>
            <input type="number" id="betAmount" class="bet-input" value="10" min="1">
        </div>
        
        <div class="action-buttons">
            <button class="btn-main btn-go" id="goBtn">START GAME</button>
            <button class="btn-main btn-cashout" id="cashBtn" disabled>CASH OUT</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
    import {
      getDatabase,
      ref,
      get,
      update,
      push,
      onValue
    } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyCjw124Pc1wGpG1iNYGuKR9DmXo_OHCab8",
      authDomain: "winwave-b3ed4.firebaseapp.com",
      databaseURL: "https://winwave-b3ed4-default-rtdb.firebaseio.com",
      projectId: "winwave-b3ed4",
      storageBucket: "winwave-b3ed4.firebasestorage.app",
      messagingSenderId: "501831087781",
      appId: "1:501831087781:web:ea52d559bcb1429b9a3f4c",
      measurementId: "G-WQM3HS90CL"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const uid = localStorage.getItem("uid");

    const balanceDisplay = document.getElementById('balance');
    const betInput = document.getElementById('betAmount');
    const goBtn = document.getElementById('goBtn');
    const cashBtn = document.getElementById('cashBtn');
    const chicken = document.getElementById('chicken');
    const statusOverlay = document.getElementById('statusOverlay');
    const gameScreen = document.getElementById('gameScreen');

    let balance = 0;
    let currentLane = 0; 
    const totalLanes = 5;
    const multipliers = [1.00, 1.20, 1.50, 2.00, 3.00, 5.00];
    
    let gameState = 'idle'; 
    let currentBet = 0;
    
    let currentPeriod = BigInt(Date.now().toString() + Math.floor(Math.random() * 1000).toString().padStart(3, '0'));

    // Real-time Balance Fetching from Firebase
    if (uid) {
        const userRef = ref(db, "users/" + uid);
        onValue(userRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.val();
                balance = Number(data.balance || 0);
                balanceDisplay.innerText = `RS ${balance.toFixed(2)}`;
            }
        });
    }

    // --- Commission System ---
    async function giveReferralCommission(playerUid, betAmt) {
        try {
            const rates = [0.005, 0.003, 0.001]; // 0.5%, 0.3%, 0.1%
            let currentUid = playerUid;
            
            for (let level = 0; level < 3; level++) {
                const snap = await get(ref(db, "users/" + currentUid));
                if (!snap.exists()) break;

                const user = snap.val();
                if (!user.refBy) break;

                const parentUid = user.refBy;
                const parentSnap = await get(ref(db, "users/" + parentUid));
                if (!parentSnap.exists()) break;

                const commission = Number(betAmt) * rates[level];
                const newBalance = Number(parentSnap.val().balance || 0) + commission;

                await update(ref(db, "users/" + parentUid), {
                    balance: newBalance
                });

                await push(ref(db, "commissionHistory/" + parentUid), {
                    from: playerUid,
                    level: level + 1,
                    amount: commission,
                    period: currentPeriod.toString(),
                    game: "ChickenRoad",
                    time: Date.now()
                });

                currentUid = parentUid;
            }
        } catch (e) {
            console.error("Commission Error:", e);
        }
    }

    // Web Audio Core Setup
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playSound(type) {
        initAudio();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'step') {
            osc.frequency.setValueAtTime(400, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        } else if (type === 'crash') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(200, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(60, audioCtx.currentTime + 0.3);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
            osc.start(); osc.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'cashout') {
            osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.08); 
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        }
    }

    function checkCrashRisk(laneIndex) {
        let rand = Math.random() * 100;
        
        if (laneIndex === 1) return false; 
        if (laneIndex === 2) return rand < 35; 
        if (laneIndex === 3) return rand < 55; 
        if (laneIndex === 4) return rand < 75; 
        return true; 
    }

    function updateLaneVisuals() {
        for(let i=1; i<=totalLanes; i++) {
            document.getElementById(`lane${i}`).classList.remove('active');
        }
        if(currentLane > 0 && currentLane <= totalLanes) {
            document.getElementById(`lane${currentLane}`).classList.add('active');
        }
    }

    function spawnCarAndCrash() {
        gameState = 'crashed';
        playSound('crash');
        
        const activeLane = document.getElementById(`lane${currentLane}`);
        const car = document.createElement('div');
        car.className = 'car';
        car.innerText = '🚘';
        activeLane.appendChild(car);

        setTimeout(() => {
            car.style.transform = 'translateX(-500px)';
        }, 50);

        setTimeout(() => {
            chicken.innerText = '💥';
            statusOverlay.style.display = 'block';
            
            car.remove(); 

            goBtn.innerText = "START GAME";
            goBtn.disabled = false;
            cashBtn.disabled = true;
        }, 600); 
    }

    // Go / Walk Button Event
    goBtn.addEventListener('click', async () => {
        initAudio();
        
        if (gameState === 'idle' || gameState === 'crashed') {
            if (!uid) {
                alert("Login Required!");
                return;
            }

            const bet = parseFloat(betInput.value);
            if (isNaN(bet) || bet <= 0 || bet > balance) {
                alert("Invalid Bet or Insufficient Balance!");
                return;
            }

            // Deduct Balance from Firebase
            balance -= bet;
            await update(ref(db, "users/" + uid), { balance: balance });
            
            // Give Commission
            currentPeriod = BigInt(Date.now().toString() + Math.floor(Math.random() * 1000).toString().padStart(3, '0'));
            giveReferralCommission(uid, bet);

            currentBet = bet;
            currentLane = 0;
            gameState = 'playing';
            statusOverlay.style.display = 'none';
            chicken.innerText = '🐔';
            chicken.style.bottom = '10px'; 
            updateLaneVisuals();
            
            balanceDisplay.innerText = `RS ${balance.toFixed(2)}`;
            goBtn.innerText = "WALK (GO)";
            cashBtn.disabled = true;
            cashBtn.innerText = "CASH OUT";
        } 
        else if (gameState === 'playing') {
            currentLane++;
            playSound('step');
            
            let stepPixels = currentLane * 52; 
            chicken.style.bottom = (10 + stepPixels) + 'px';
            updateLaneVisuals();

            let isCrashed = checkCrashRisk(currentLane);

            if (isCrashed) {
                goBtn.disabled = true;
                spawnCarAndCrash();
            } else {
                let currentWinning = currentBet * multipliers[currentLane];
                cashBtn.innerText = `CASH OUT (₨ ${currentWinning.toFixed(2)})`;
                cashBtn.disabled = false;

                if (currentLane === totalLanes) {
                    triggerCashout();
                }
            }
        }
    });

    // Cashout Logic Database Sync
    async function triggerCashout() {
        let profit = currentBet * multipliers[currentLane];
        balance += profit;
        
        if (uid) {
            const snap = await get(ref(db, "users/" + uid));
            if (snap.exists()) {
                let freshBalance = Number(snap.val().balance || 0);
                freshBalance += profit;
                await update(ref(db, "users/" + uid), { balance: freshBalance });
            }
        }

        playSound('cashout');
        
        gameState = 'idle';
        goBtn.innerText = "START GAME";
        cashBtn.disabled = true;
        cashBtn.innerText = "CASH OUT";
    }

    cashBtn.addEventListener('click', () => {
        initAudio();
        if (gameState === 'playing' && currentLane > 0) {
            triggerCashout();
        }
    });
</script>

</body>
</html>
