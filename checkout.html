<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Payment Verification</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #121212; color: #ffffff; display: flex; justify-content: center; }
        .app-container { width: 100%; max-width: 450px; background-color: #1a1a1a; min-height: 100vh; padding: 20px; }
        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .header a { color: #a3a3a3; text-decoration: none; font-size: 16px; }
        
        .checkout-box { background-color: #1e1e1e; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; text-align: center; }
        .checkout-box h2 { color: #10b981; margin-bottom: 10px; font-size: 20px; }
        .checkout-box p { color: #a3a3a3; font-size: 14px; margin-bottom: 20px; }
        .amount-display { font-size: 28px; font-weight: bold; color: #f59e0b; margin-bottom: 20px; }
        
        /* Bank Details Card */
        .bank-details { background-color: #262626; padding: 15px; border-radius: 8px; margin-bottom: 20px; text-align: left; border: 1px dashed #444; }
        .bank-details div { margin-bottom: 8px; font-size: 14px; }
        .bank-details span { color: #10b981; font-weight: bold; }
        
        /* QR Code */
        .qr-section { margin-bottom: 20px; }
        .qr-image { width: 200px; height: 200px; border-radius: 10px; border: 2px solid #333; object-fit: contain; background: #fff; }
        
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; font-size: 12px; color: #a3a3a3; margin-bottom: 6px; text-transform: uppercase; }
        .input-field { width: 100%; background-color: #121212; border: 1px solid #333; padding: 12px; border-radius: 8px; color: #fff; outline: none; }
        .input-field:focus { border-color: #10b981; }
        
        .submit-btn { width: 100%; background-color: #10b981; color: white; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .submit-btn:disabled { background-color: #555; cursor: not-allowed; }
        
        /* Loader */
        #loader { display: none; color: #10b981; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="header">
            <a href="index.html"><i class="fa-solid fa-arrow-left"></i> Back to Dashboard</a>
        </div>

        <div class="checkout-box">
            <h2>Payment Verification</h2>
            <p>Scan the QR code or send payment to the account details below.</p>
            
            <div class="amount-display" id="displayAmount">RS 0</div>

            <div class="bank-details" id="bankDetailsBox">
                <!-- Data will be populated via JS -->
            </div>

            <div class="qr-section">
                <img id="qrCodeImage" src="" alt="QR Code" class="qr-image" onerror="this.src='https://via.placeholder.com/200?text=No+QR+Code'">
            </div>

            <div class="form-group">
                <label>Transaction ID / TRX ID</label>
                <input type="text" id="trxId" class="input-field" placeholder="Enter 11 or 12 digit Trx ID" required>
            </div>

            <div class="form-group">
                <label>Upload Payment Screenshot</label>
                <input type="file" id="screenshotFile" class="input-field" accept="image/*" required>
            </div>

            <button class="submit-btn" id="submitBtn" onclick="submitDepositRequest()">SUBMIT DEPOSIT</button>
            <div id="loader"><i class="fa-solid fa-spinner fa-spin"></i> Submitting... please wait</div>
        </div>
    </div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, push, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        import { getStorage, ref as storageRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-storage.js";

        // Same Configuration as index.html
        const firebaseConfig = {
          apiKey: "AIzaSyCjw124Pc1wGpG1iNYGuKR9DmXo_OHCab8",
          authDomain: "winwave-b3ed4.firebaseapp.com",
          projectId: "winwave-b3ed4",
          storageBucket: "winwave-b3ed4.firebasestorage.app",
          messagingSenderId: "501831087781",
          appId: "1:501831087781:web:ea52d559bcb1429b9a3f4c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const storage = getStorage(app);

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
            } else {
                alert("Please login first!");
                window.location.href = "index.html";
            }
        });

        // ----------------------------------------------------
        // ADMIN PAYMENT DETAILS (Yahan aap apni details dalein)
        // ----------------------------------------------------
        const gatewayDetails = {
            easypaisa: {
                title: "EasyPaisa Account",
                name: "Qasam Ali Jutt", // Apna naam likhein
                number: "03451234567",  // Apna number likhein
                qr_image: "easypaisa_qr.jpg" // Apne easypaisa QR ki picture folder mein rakhein
            },
            jazzcash: {
                title: "JazzCash Account",
                name: "Qasam Ali Jutt",
                number: "03001234567",
                qr_image: "jazzcash_qr.jpg"
            },
            bank: {
                title: "Bank Account (Meezan/HBL)",
                name: "Qasam Ali Jutt",
                number: "01234567891234",
                qr_image: "bank_qr.jpg"
            }
        };

        // Extract Params from URL (Jo index.html se aaye hain)
        const urlParams = new URLSearchParams(window.location.search);
        const method = urlParams.get("method");
        const amount = urlParams.get("amount");

        // Display Data
        if (amount) {
            document.getElementById("displayAmount").innerText = "RS " + amount;
        }

        if (method && gatewayDetails[method]) {
            const data = gatewayDetails[method];
            document.getElementById("bankDetailsBox").innerHTML = `
                <div>Method: <span>${data.title}</span></div>
                <div>Account Title: <span>${data.name}</span></div>
                <div>Account Number: <span>${data.number}</span></div>
            `;
            document.getElementById("qrCodeImage").src = data.qr_image;
        }

        // Submit Function
        window.submitDepositRequest = async function() {
            const trxId = document.getElementById("trxId").value;
            const fileInput = document.getElementById("screenshotFile").files[0];

            if (!trxId || !fileInput) {
                alert("Please enter Transaction ID and upload screenshot!");
                return;
            }

            if (!currentUser) {
                alert("User not found, please login again.");
                return;
            }

            // UI changes during upload
            document.getElementById("submitBtn").disabled = true;
            document.getElementById("loader").style.display = "block";

            try {
                // 1. Upload Screenshot to Firebase Storage
                const fileRef = storageRef(storage, `deposits/${currentUser.uid}/${Date.now()}_${fileInput.name}`);
                await uploadBytes(fileRef, fileInput);
                const screenshotUrl = await getDownloadURL(fileRef);

                // 2. Save Deposit Data to Realtime Database for Admin Approval
                const depositRef = push(ref(db, "deposit_requests")); // New node for admin to check
                await set(depositRef, {
                    uid: currentUser.uid,
                    amount: Number(amount),
                    method: method,
                    trxId: trxId,
                    screenshotUrl: screenshotUrl,
                    status: "Pending", // Admin will change this to 'Approved'
                    timestamp: Date.now()
                });

                alert("Deposit request submitted successfully! Wait for admin approval.");
                window.location.href = "index.html"; 

            } catch (error) {
                console.error(error);
                alert("Error submitting request: " + error.message);
                document.getElementById("submitBtn").disabled = false;
                document.getElementById("loader").style.display = "none";
            }
        }
    </script>
</body>
</html>
